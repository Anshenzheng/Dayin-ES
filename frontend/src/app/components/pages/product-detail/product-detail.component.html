<div class="container" style="padding: 40px 0;">
  <div class="page-header">
    <a routerLink="/products" style="color: #1a5fb4; text-decoration: none; display: inline-block; margin-bottom: 15px;">
      ← 返回产品列表
    </a>
    <h1 class="page-title">{{product.name}}</h1>
  </div>

  <div class="card">
    <div class="card-body" style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px;">
      <div>
        <div class="image-carousel" *ngIf="images.length > 0">
          <div class="carousel-container" [style.transform]="'translateX(-' + currentSlide * 100 + '%)'">
            <div class="carousel-slide" *ngFor="let image of images">
              <img [src]="getImageUrl(image)" [alt]="product.name"
                   (error)="$event.target.src = 'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=professional%20industrial%20product%20photography%20detail&image_size=landscape_4_3'">
            </div>
          </div>
          <button *ngIf="images.length > 1" class="carousel-nav carousel-prev" (click)="prevSlide()">‹</button>
          <button *ngIf="images.length > 1" class="carousel-nav carousel-next" (click)="nextSlide()">›</button>
          <div *ngIf="images.length > 1" class="carousel-dots">
            <button *ngFor="let image of images; let i = index" class="carousel-dot"
                    [class.active]="currentSlide === i"
                    (click)="goToSlide(i)">
            </button>
          </div>
        </div>

        <div *ngIf="images.length > 1" style="display: flex; gap: 10px; margin-top: 15px; overflow-x: auto;">
          <div *ngFor="let image of images; let i = index"
               style="min-width: 100px; height: 80px; cursor: pointer; border: 2px solid #ddd; border-radius: 4px; overflow: hidden;"
               [style.borderColor]="currentSlide === i ? '#1a5fb4' : '#ddd'"
               (click)="goToSlide(i)">
            <img [src]="getImageUrl(image)" style="width: 100%; height: 100%; object-fit: cover;">
          </div>
        </div>
      </div>

      <div>
        <h2 style="margin-bottom: 20px;">{{product.name}}</h2>

        <div style="margin-bottom: 30px;">
          <h4 style="margin-bottom: 10px; color: #1a5fb4;">产品描述</h4>
          <p style="line-height: 1.8; color: #666; white-space: pre-wrap;">
            {{product.description || '暂无产品描述'}}
          </p>
        </div>

        <div style="margin-bottom: 30px;" *ngIf="product.specifications">
          <h4 style="margin-bottom: 10px; color: #1a5fb4;">产品规格</h4>
          <p style="line-height: 1.8; color: #666; white-space: pre-wrap;">
            {{product.specifications}}
          </p>
        </div>

        <div style="margin-top: 30px;">
          <a routerLink="/contact" class="btn btn-primary">咨询产品</a>
        </div>
      </div>
    </div>
  </div>
</div>
