<div>
  <div class="page-header">
    <h1 class="page-title">控制台</h1>
  </div>

  <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px;">
    <div class="card">
      <div class="card-body" style="text-align: center;">
        <h3 style="font-size: 36px; color: #1a5fb4; margin-bottom: 10px;">{{stats.products}}</h3>
        <p style="color: #666;">产品数量</p>
      </div>
    </div>

    <div class="card">
      <div class="card-body" style="text-align: center;">
        <h3 style="font-size: 36px; color: #28a745; margin-bottom: 10px;">{{stats.news}}</h3>
        <p style="color: #666;">新闻数量</p>
      </div>
    </div>

    <div class="card">
      <div class="card-body" style="text-align: center;">
        <h3 style="font-size: 36px; color: #ffc107; margin-bottom: 10px;">{{stats.categories}}</h3>
        <p style="color: #666;">产品分类</p>
      </div>
    </div>

    <div class="card">
      <div class="card-body" style="text-align: center;">
        <h3 style="font-size: 36px; color: #dc3545; margin-bottom: 10px;">{{stats.unreadMessages}}</h3>
        <p style="color: #666;">未读留言</p>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      快捷操作
    </div>
    <div class="card-body" style="display: flex; gap: 15px; flex-wrap: wrap;">
      <a routerLink="/admin/products/new" class="btn btn-primary">添加产品</a>
      <a routerLink="/admin/news/new" class="btn btn-primary">发布新闻</a>
      <a routerLink="/admin/categories" class="btn btn-secondary">管理分类</a>
      <a routerLink="/admin/messages" class="btn btn-secondary">查看留言</a>
    </div>
  </div>
</div>
