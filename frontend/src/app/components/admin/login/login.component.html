<div class="login-page">
  <div class="login-card">
    <h2>后台管理登录</h2>

    <div *ngIf="errorMessage" class="alert alert-error">
      {{errorMessage}}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" formControlName="username" class="form-control" placeholder="请输入用户名">
      </div>

      <div class="form-group">
        <label>密码</label>
        <input type="password" formControlName="password" class="form-control" placeholder="请输入密码">
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;"
              [disabled]="submitting || loginForm.invalid">
        {{submitting ? '登录中...' : '登 录'}}
      </button>
    </form>

    <div style="margin-top: 20px; text-align: center; color: #666; font-size: 13px;">
      默认账号：admin / admin123
    </div>
  </div>
</div>
