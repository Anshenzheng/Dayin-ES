<div>
  <div class="page-header" style="display: flex; justify-content: space-between; align-items: center;">
    <h1 class="page-title">{{isNew ? '添加产品' : '编辑产品'}}</h1>
    <button class="btn btn-secondary" (click)="goBack()">返回列表</button>
  </div>

  <div *ngIf="successMessage" class="alert alert-success">
    {{successMessage}}
  </div>

  <div *ngIf="errorMessage" class="alert alert-error">
    {{errorMessage}}
  </div>

  <div class="card">
    <div class="card-body" *ngIf="!loading">
      <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
          <div class="form-group">
            <label>产品分类 <span style="color: red;">*</span></label>
            <select formControlName="categoryId" class="form-control">
              <option [ngValue]="null">请选择分类</option>
              <option *ngFor="let category of categories" [ngValue]="category.id">
                {{category.name}}
              </option>
            </select>
          </div>

          <div class="form-group">
            <label>产品名称 <span style="color: red;">*</span></label>
            <input type="text" formControlName="name" class="form-control" placeholder="请输入产品名称">
          </div>
        </div>

        <div class="form-group">
          <label>产品描述</label>
          <textarea formControlName="description" class="form-control" rows="4" placeholder="请输入产品描述"></textarea>
        </div>

        <div class="form-group">
          <label>产品规格</label>
          <textarea formControlName="specifications" class="form-control" rows="4" placeholder="请输入产品规格"></textarea>
        </div>

        <div class="form-group">
          <label>主图</label>
          <input type="file" accept="image/*" (change)="onMainImageUpload($event)" class="form-control">
          <div *ngIf="f['mainImageUrl'].value" style="margin-top: 10px;">
            <img [src]="getImageUrl({imageUrl: f['mainImageUrl'].value})" style="width: 200px; height: 150px; object-fit: cover; border: 1px solid #ddd;">
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
          <div class="form-group">
            <label>排序</label>
            <input type="number" formControlName="sortOrder" class="form-control">
          </div>

          <div class="form-group">
            <label>状态</label>
            <select formControlName="status" class="form-control">
              <option value="active">上架</option>
              <option value="inactive">下架</option>
            </select>
          </div>
        </div>

        <div class="form-group" *ngIf="!isNew">
          <label>产品图片（多图）</label>
          <input type="file" accept="image/*" multiple (change)="onImageUpload($event)" class="form-control">
          <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px;">
            <div *ngFor="let image of productImages; let i = index" style="position: relative;">
              <img [src]="getImageUrl(image)" style="width: 150px; height: 120px; object-fit: cover; border: 1px solid #ddd; border-radius: 4px;">
              <button type="button" (click)="removeImage(i)"
                      style="position: absolute; top: -8px; right: -8px; width: 24px; height: 24px; border-radius: 50%; border: none; background: #dc3545; color: white; cursor: pointer;">
                ×
              </button>
            </div>
          </div>
        </div>

        <div style="margin-top: 20px;">
          <button type="submit" class="btn btn-primary" [disabled]="saving || productForm.invalid">
            {{saving ? '保存中...' : '保存'}}
          </button>
          <button type="button" class="btn btn-secondary" style="margin-left: 10px;" (click)="goBack()">
            取消
          </button>
        </div>
      </form>
    </div>

    <div class="card-body loading" *ngIf="loading">
      加载中...
    </div>
  </div>
</div>
