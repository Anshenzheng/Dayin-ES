<div>
  <div class="page-header" style="display: flex; justify-content: space-between; align-items: center;">
    <h1 class="page-title">产品管理</h1>
    <a routerLink="/admin/products/new" class="btn btn-primary">添加产品</a>
  </div>

  <div class="card">
    <div class="card-body" *ngIf="!loading">
      <table class="table" *ngIf="products.length > 0">
        <thead>
          <tr>
            <th>产品名称</th>
            <th>分类</th>
            <th>排序</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let product of products">
            <td>{{product.name}}</td>
            <td>{{getCategoryName(product.categoryId)}}</td>
            <td>{{product.sortOrder}}</td>
            <td>
              <span class="badge" [ngClass]="getStatusClass(product.status)">
                {{getStatusText(product.status)}}
              </span>
            </td>
            <td>
              <button class="btn btn-primary" style="padding: 5px 10px; font-size: 12px; margin-right: 5px;"
                      (click)="editProduct(product.id)">
                编辑
              </button>
              <button class="btn btn-danger" style="padding: 5px 10px; font-size: 12px;"
                      (click)="deleteProduct(product.id)">
                删除
              </button>
            </td>
          </tr>
        </tbody>
      </table>

      <div class="empty-state" *ngIf="products.length === 0">
        <p>暂无产品，点击"添加产品"创建第一个产品</p>
      </div>
    </div>

    <div class="card-body loading" *ngIf="loading">
      加载中...
    </div>
  </div>
</div>
