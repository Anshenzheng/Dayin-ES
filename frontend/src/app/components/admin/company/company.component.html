<div>
  <div class="page-header">
    <h1 class="page-title">公司介绍管理</h1>
  </div>

  <div *ngIf="successMessage" class="alert alert-success">
    {{successMessage}}
  </div>

  <div *ngIf="errorMessage" class="alert alert-error">
    {{errorMessage}}
  </div>

  <div class="card">
    <div class="card-body" *ngIf="!loading">
      <form [formGroup]="companyForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label>公司标题</label>
          <input type="text" formControlName="title" class="form-control" placeholder="请输入公司标题">
        </div>

        <div class="form-group">
          <label>公司介绍</label>
          <textarea formControlName="content" class="form-control" rows="8" placeholder="请输入公司介绍"></textarea>
        </div>

        <div class="form-group">
          <label>公司图片</label>
          <input type="file" accept="image/*" (change)="onImageUpload($event)" class="form-control">
          <div *ngIf="companyForm.value.imageUrl" style="margin-top: 10px;">
            <img [src]="'http://localhost:8080' + companyForm.value.imageUrl" 
                 style="max-width: 400px; max-height: 300px; border: 1px solid #ddd; border-radius: 4px;"
                 (error)="$event.target.src = 'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=company%20building%20headquarters&image_size=landscape_4_3'">
          </div>
        </div>

        <div style="margin-top: 20px;">
          <button type="submit" class="btn btn-primary" [disabled]="saving">
            {{saving ? '保存中...' : '保存'}}
          </button>
        </div>
      </form>
    </div>

    <div class="card-body loading" *ngIf="loading">
      加载中...
    </div>
  </div>
</div>
